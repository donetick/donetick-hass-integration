## ─── Dashboard Card ─────────────────────────────────────────────────────────────
## This uses auto-entities + mushroom chips to create a chore list.
## Requirements:
##   - HACS cards: auto-entities, mushroom, stack-in-card (all popular/common)
##
## If you don't have those, a simpler entities card version is at the bottom.

